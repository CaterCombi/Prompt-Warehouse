kind = "web"
previewPath = "/"
title = "CaterCombi Warehouse Wallboard"
version = "1.0.0"
id = "artifacts/wallboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19215

[services.development]
run = "pnpm --filter @workspace/wallboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wallboard", "run", "build" ]
publicDir = "artifacts/wallboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19215"
BASE_PATH = "/"
